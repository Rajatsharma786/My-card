<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajat Sharma | AI & Automation</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #00d4ff; /* Azure Blue */
            --save-btn: #2ecc71; /* Success Green */
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            width: 100%;
            max-width: 350px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .profile-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00d4ff, #005f73);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
        }

        h1 { margin: 10px 0 5px; font-size: 1.6rem; letter-spacing: 1px; }
        .title { color: var(--accent); font-weight: 600; font-size: 0.9rem; margin-bottom: 20px; text-transform: uppercase; }
        
        .tagline { font-size: 0.85rem; opacity: 0.8; line-height: 1.5; margin-bottom: 25px; }

        .services {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .tag {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .btn {
            display: block;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            margin-bottom: 12px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 1rem;
        }

        .btn-save {
            background: transparent;
            border: 2px solid var(--save-btn);
            color: var(--save-btn);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="card">
    <div class="profile-icon">RS</div>
    <h1>Rajat Sharma</h1>
    <div class="title">AI & Automation Engineer</div>
    
    <p class="tagline">Building intelligent systems that automate and scale businesses.</p>

    <div class="services">
        <span class="tag">AI Chatbots</span>
        <span class="tag">Workflows</span>
        <span class="tag">Azure</span>
    </div>

    <button onclick="downloadVCard()" class="btn btn-save">💾 Save to Contacts</button>
    <a href="mailto:rajatsharma786.rs@gmail.com" class="btn">Connect via Email</a>
    <a href="https://linkedin.com/in/rajatsharma786" target="_blank" class="btn btn-outline">View LinkedIn</a>
</div>

<script>
    function downloadVCard() {
        const vcardData = [
            "BEGIN:VCARD",
            "VERSION:3.0",
            "FN:Rajat Sharma",
            "N:Sharma;Rajat;;;",
            "TITLE:AI & Automation Engineer",
            "ORG:AI & Automation Solutions",
            "EMAIL;TYPE=INTERNET;TYPE=WORK:rajatsharma786.rs@gmail.com",
            "URL:https://linkedin.com/in/rajatsharma786",
            "END:VCARD"
        ].join("\n");

        const blob = new Blob([vcardData], { type: "text/vcard" });
        const url = window.URL.createObjectURL(blob);
        const newLink = document.createElement("a");
        newLink.download = "Rajat_Sharma_Contact.vcf";
        newLink.href = url;
        newLink.click();
        window.URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
